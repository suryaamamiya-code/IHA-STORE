<!DOCTYPE html>

    header h1 { margin:0; }
    .hero { padding:60px 20px; text-align:center; }
    .btn { display:inline-block; margin-top:20px; padding:12px 25px; background:#06b6d4; color:white; text-decoration:none; border-radius:25px; }
    .section { padding:40px; text-align:center; }
    .card { background:#1e293b; padding:20px; border-radius:15px; margin:10px; display:inline-block; }
    input, select {
      padding:10px;
      margin:10px;
      border-radius:10px;
      border:none;
      width:250px;
    }
    .wa-float {
      position:fixed;
      bottom:20px;
      right:20px;
      background:#25D366;
      color:white;
      padding:15px;
      border-radius:50%;
      text-decoration:none;
    }

</head>
<body>

<header>
  <h1>IHA / SAKWH</h1>

<section class="hero">

  <a href="https://wa.me/6283806255891" class="btn">Order Sekarang</a>
</section>

<section class="section">
  <h2>Harga</h2>

<footer>
  <p>© 2026 IHA / SAKWH</p>
</footer>

<a href="https://wa.me/6283806255891" class="wa-float">💬</a>

<script>
function orderWA(){
  let nama = document.getElementById('nama').value;
  let alamat = document.getElementById('alamat').value;
  let produk = document.getElementById('produk').value;

  let pesan = `Halo, saya mau order:%0A
Nama: ${nama}%0AAlamat: ${alamat}%0AProduk: ${produk}`;
  window.open(`https://wa.me/6283806255891?text=${pesan}`);
}
